<!DOCTYPE html>

<html>

<head>

    <title>Users Table</title>

</head>

<body>

<h1>Users Table</h1>

<table border="1" cellpadding="10">

<tr>

    <th>User ID</th>

    <th>Full Name</th>

    <th>Email</th>

    <th>Phone</th>

    <th>Role</th>

    <th>Active</th>

</tr>

{% for i in data %}

<tr>

    <td>{{ i.user_id }}</td>

    <td>{{ i.full_name }}</td>

    <td>{{ i.email }}</td>

    <td>{{ i.phone }}</td>

    <td>{{ i.role }}</td>

    <td>{{ i.is_active }}</td>

</tr>

{% endfor %}

</table>

</body>

</html>
