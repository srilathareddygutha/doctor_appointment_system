<!DOCTYPE html>

<html>

<head>

    <title>Notifications Table</title>

</head>

<body>

<h1>Notifications Table</h1>

<table border="1" cellpadding="10">

<tr>

    <th>Notification ID</th>

    <th>User ID</th>

    <th>Title</th>

    <th>Type</th>

    <th>Read</th>

</tr>

{% for i in data %}

<tr>

    <td>{{ i.notification_id }}</td>

    <td>{{ i.user.user_id }}</td>

    <td>{{ i.title }}</td>

    <td>{{ i.notification_type }}</td>

    <td>{{ i.is_read }}</td>

    <td>

<a href="/delete-notification/{{ i.notification_id }}/">

Delete

</a>

</td>

</tr>

{% endfor %}

</table>

</body>

</html>
